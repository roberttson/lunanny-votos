<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>OBS Overlay — Nota</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    font-family: 'Space Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .card.show {
    opacity: 1;
    transform: scale(1);
  }

  .star-score {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .star {
    font-size: 48px;
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(255, 210, 50, 0.7));
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .score {
    font-size: 64px;
    font-weight: 700;
    color: #fff;
    text-shadow:
      0 0 20px rgba(145, 71, 255, 0.8),
      0 2px 4px rgba(0,0,0,0.9);
    line-height: 1;
    letter-spacing: -2px;
  }

  .voters {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="star-score">
    <span class="star">⭐</span>
    <span class="score" id="score">—</span>
  </div>
  <div class="voters" id="voters"></div>
</div>

<script>
  const card = document.getElementById('card');
  const scoreEl = document.getElementById('score');
  const votersEl = document.getElementById('voters');

  function update() {
    try {
      const raw = localStorage.getItem('twitch_votes');
      if (!raw) return;
      const data = JSON.parse(raw);

      if (data.avg && data.total > 0) {
        scoreEl.textContent = data.avg;
        votersEl.textContent = `${data.total} voto${data.total !== 1 ? 's' : ''}`;
        card.classList.add('show');
      } else {
        card.classList.remove('show');
      }
    } catch(e) {}
  }

  // Escuchar cambios de storage (mismo dominio, file://)
  window.addEventListener('storage', update);

  // También polling por si el evento no dispara (mismo tab edge case)
  setInterval(update, 1000);

  update();
</script>
</body>
</html>
